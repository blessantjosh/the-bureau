<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Bureau — multi-agent AI workspace</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap"
  rel="stylesheet"
/>
<link rel="stylesheet" href="/style.css" />
</head>
<body>

<div class="ambient" aria-hidden="true">
  <canvas id="particleCanvas"></canvas>
  <div class="gradient-orb orb-1"></div>
  <div class="gradient-orb orb-2"></div>
  <div class="gradient-orb orb-3"></div>
  <div class="noise-overlay"></div>
</div>

<div id="splash" class="splash">
  <div class="splash-inner">
    <div class="splash-logo">TB</div>
    <p class="splash-label">The Bureau</p>
    <div class="splash-bar"><span></span></div>
  </div>
</div>

<div id="dynamicIsland" class="dynamic-island compact" data-state="boot">
  <div class="island-glow"></div>
  <div class="island-inner">
    <div class="island-compact">
      <span class="island-dot"></span>
      <span id="islandTag" class="island-tag">···</span>
      <span id="islandStatus" class="island-status-text">Connecting</span>
    </div>
    <div class="island-expanded">
      <div class="island-avatar" id="islandAvatar">TB</div>
      <div class="island-meta">
        <p id="islandAgentName" class="island-agent-name">The Bureau</p>
        <p id="islandAgentRole" class="island-agent-role">Initializing…</p>
      </div>
      <div id="islandWave" class="island-wave hidden" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <div id="islandMetaRight" class="island-meta-right">
        <span id="islandProvider" class="island-provider">—</span>
        <span id="islandMsgCount" class="island-count">0 msgs</span>
      </div>
    </div>
  </div>
</div>

<button id="mobileRosterToggle" class="mobile-roster-toggle" aria-label="Open staff directory">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
    <path d="M4 6H20M4 12H20M4 18H14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
  </svg>
</button>

<div class="bureau">

  <aside class="roster glass" id="roster">
    <div class="roster-header">
      <div class="roster-brand">
        <span class="roster-logo">TB</span>
        <div>
          <p class="roster-eyebrow">THE BUREAU</p>
          <h1 class="roster-title">Staff Directory</h1>
        </div>
        <button id="themeToggle" class="theme-toggle-btn" aria-label="Toggle theme" title="Toggle dark/light theme">
          <svg class="sun-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <svg class="moon-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>
      <p class="roster-sub">Five specialists. One workspace.</p>
    </div>

    <div class="roster-list" id="rosterList"></div>

    <div class="roster-footer">
      <div class="status-pill" id="statusPill">
        <span class="status-dot"></span>
        <span id="providerTag">connecting…</span>
      </div>
      <button type="button" id="clearChatBtn" class="ghost-btn" title="Clear this agent's chat">
        Clear chat
      </button>
    </div>
  </aside>

  <div id="rosterBackdrop" class="roster-backdrop"></div>

  <main class="desk glass-panel">
    <header class="desk-header" id="deskHeader"></header>

    <div class="transcript-wrap">
      <div class="transcript" id="transcript"></div>
      <div class="transcript-fade"></div>
    </div>

    <form class="composer glass" id="composer">
      <div class="composer-glow"></div>
      <textarea
        id="composerInput"
        placeholder="Write to this specialist…"
        rows="1"
        autocomplete="off"
      ></textarea>
      <button type="submit" id="sendButton" class="send-button" aria-label="Send message">
        <svg class="send-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M3 11L21 3L13 21L11 13L3 11Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
        </svg>
        <span class="send-spinner"></span>
      </button>
    </form>
  </main>

</div>

<script src="/app.js"></script>
</body>
</html>
