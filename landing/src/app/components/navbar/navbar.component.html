<nav [class]="navClass" role="navigation" aria-label="Main navigation">
  <div class="nav-inner">
    <a class="logo" href="#" aria-label="NeuralOS">
      <div class="logo-mark">
        <svg width="30" height="30" viewBox="0 0 32 32" fill="none">
          <circle cx="16" cy="16" r="14" stroke="url(#ng)" stroke-width="1.5"/>
          <circle cx="16" cy="16" r="5" fill="url(#ng)"/>
          <circle cx="8" cy="10" r="2" fill="#60A5FA"/>
          <circle cx="24" cy="10" r="2" fill="#A78BFA"/>
          <circle cx="8" cy="22" r="2" fill="#34D399"/>
          <circle cx="24" cy="22" r="2" fill="#22D3EE"/>
          <line x1="10" y1="11.5" x2="13.5" y2="14" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
          <line x1="22" y1="11.5" x2="18.5" y2="14" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
          <line x1="10" y1="20.5" x2="13.5" y2="18" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
          <line x1="22" y1="20.5" x2="18.5" y2="18" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
          <defs>
            <linearGradient id="ng" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#3B82F6"/>
              <stop offset="100%" stop-color="#8B5CF6"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <span class="logo-text">Neural<span class="logo-accent">OS</span></span>
    </a>

    <ul class="nav-links" role="list">
      @for (item of navItems; track item.label) {
        <li><button class="nav-link" (click)="scrollTo(item.href)">{{ item.label }}</button></li>
      }
    </ul>

    <div class="nav-cta">
      <button class="btn-ghost" aria-label="Sign in">Sign In</button>
      <button class="btn-cta btn-magnetic" aria-label="Get started">
        Get Started
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>
    </div>

    <button class="hamburger" (click)="toggleMobile()" [attr.aria-expanded]="isMobileOpen()" aria-label="Menu">
      <span [class.open]="isMobileOpen()"></span>
    </button>
  </div>

  @if (isMobileOpen()) {
    <div class="mobile-nav" role="dialog">
      @for (item of navItems; track item.label) {
        <button class="mobile-link" (click)="scrollTo(item.href)">{{ item.label }}</button>
      }
      <div class="mobile-cta">
        <button class="btn-ghost w-full">Sign In</button>
        <button class="btn-cta w-full">Get Started</button>
      </div>
    </div>
  }
</nav>
